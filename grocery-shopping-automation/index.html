<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Market Alışveriş Otomasyonu</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    
<h2>Market Alışveriş Listesi</h2>

<div class="form">
<input type="text" id="urunInput" placeholder="Ürün adı girin">
<input type="number" id="fiyatInput" placeholder="Fiyat">
<select id="kategoriInput">
    <option value="Gıda">Gıda</option>
    <option value="İçecek">İçecek</option>
    <option value="Temizlik">Temizlik</option>
</select>
<button id="ekleBtn">Ürün Ekle</button>
</div>

<div class="search-sorting">
<input type="text" id="searchInput" placeholder="Ürün ara...">
<select id="kategoriFiltre">
    <option value="Hepsi">Tüm Kategoriler</option>
    <option value="Gıda">Gıda</option>
    <option value="İçecek">İçecek</option>
    <option value="Temizlik">Temizlik</option>
</select>
<select id="siralama">
    <option value="art">Fiyata Göre Artan</option>
    <option value="az">Fiyata Göre Azalan</option>
</select>
</div>

<div id="urunListesi" class="urun-grid"></div>

<p id="toplamFiyat">Toplam: 0 TL</p>

<div class="sayfa-linkleri">
    <a href="ekle.html">Ürün Ekle Sayfası</a> | 
    <a href="rapor.html">Rapor Sayfası</a>
</div>

<script src="script.js"></script>
</div>

</body>
</html>
