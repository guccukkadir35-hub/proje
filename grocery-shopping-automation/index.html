<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Market Alışveriş Otomasyonu</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2>Market Alışveriş Listesi</h2>

<div class="form">
<input type="text" id="urunInput" placeholder="Ürün adı girin">
<input type="number" id="fiyatInput" placeholder="Fiyat">
<button id="ekleBtn">Ürün Ekle</button>
</div>

<div class="search">
<input type="text" id="searchInput" placeholder="Ürün ara...">
</div>

<ul id="urunListesi"></ul>

<div class="pagination">
<button id="prevBtn">Önceki</button>
<span id="sayfaBilgi"></span>
<button id="nextBtn">Sonraki</button>
</div>

<script src="script.js"></script>
</div>

</body>
</html>
